<link rel="stylesheet" href="/stylepop.css">

<script>
// Variável de controle para evitar múltiplas exibições simultâneas
let popupVisivel = false;

// Função para mostrar o popup
function mostrarPopup() {
  const popup = document.getElementById("popup");
  if (popup && !popupVisivel) {
    popup.style.display = "flex";
    popupVisivel = true;
  }
}

// Função para fechar o popup
function fecharPopup() {
  const popup = document.getElementById("popup");
  if (popup) {
    popup.style.display = "none";
    popupVisivel = false; // Permite que o popup seja mostrado novamente
  }
}

// ------------------ Inicialização do histórico falso ------------------
// Adiciona um estado extra no histórico para capturar o botão voltar
history.pushState({ pagina: 'popup' }, '', '');

// ------------------ Interceptação do botão voltar ------------------
window.addEventListener('popstate', function(event) {
  // Quando o usuário clica em voltar, mostramos o popup
  mostrarPopup();
  // Adicionamos novamente um estado para que o próximo voltar também seja capturado
  history.pushState({ pagina: 'popup' }, '', '');
});

// ------------------ Desktop: mouse sai da janela ------------------
document.addEventListener('mouseout', function(e) {
  // Se o mouse sair pelo topo (menos de 10px do topo)
  if (e.clientY < 10) {
    mostrarPopup();
  }
});

// ------------------ Mobile: scroll rápido para cima ------------------
let ultimaPosicaoScroll = window.pageYOffset;

window.addEventListener('scroll', function() {
  let posicaoAtual = window.pageYOffset;
  // Se o usuário rolou para cima rapidamente (diferença > 40 pixels)
  if (ultimaPosicaoScroll - posicaoAtual > 40) {
    mostrarPopup();
  }
  ultimaPosicaoScroll = posicaoAtual;
});

// ------------------ Opcional: garantir que o histórico esteja sempre presente ------------------
// Caso o usuário navegue por links internos ou algo que mude o histórico,
// podemos reinserir o estado falso após um pequeno atraso.
// Isso não é obrigatório, mas ajuda em páginas com navegação por AJAX.
window.addEventListener('load', function() {
  // Pequeno atraso para evitar conflitos com outros scripts
  setTimeout(function() {
    history.pushState({ pagina: 'popup' }, '', '');
  }, 100);
});
</script>
