<script>
(function () {

  /* 1 ── Lê e faz parse do JSON embutido */
  var C;
  try {
    C = JSON.parse(document.getElementById('quiz-config').textContent);
  } catch (e) {
    document.getElementById('quizError').style.display  = 'flex';
    document.getElementById('errorDetail').textContent  = e.message;
    return;
  }

  /* 2 ── Atalhos */
  var T     = C.tema        || {};
  var P     = C.pagina      || {};
  var H     = C.header      || {};
  var PB    = C.progressBar || {};
  var NAV   = C.navegacao   || {};
  var steps = C.etapas      || [];

  /* 3 ── Aplica tema */
  var root = document.documentElement;
  function sv(v, val) { if (val) root.style.setProperty(v, val); }
  if (T.corPrincipal) {
    sv('--accent',        T.corPrincipal);
    sv('--accent-light',  T.corPrincipal + '1a');
    sv('--accent-border', T.corPrincipal + '99');
  }
  sv('--bg',    T.corFundo);
  sv('--card',  T.corCard);
  sv('--text',  T.corTexto);
  sv('--muted', T.corTextomuted);
  if (T.fonteTitulo) sv('--font-display', "'" + T.fonteTitulo + "', Georgia, serif");
  if (T.fonteCorpo)  sv('--font-body',    "'" + T.fonteCorpo  + "', system-ui, sans-serif");

  /* 4 ── Página */
  if (P.titulo) document.title = P.titulo;

  /* 5 ── Header */
  document.getElementById('hLogo').textContent = H.logo || '';
  document.getElementById('hNome').textContent = H.nome || '';

  /* 6 ── Progress bar */
  if (PB.mostrar === false)
    document.getElementById('progressWrap').style.display = 'none';

  /* 7 ── Estado */
  var stepIdx = 0, qIdx = 0;
  var answers = {};
  var totalQ  = steps.reduce(function(n, s){ return n + (s.perguntas||[]).length; }, 0);

  function globalIdx() {
    var g = 0;
    for (var i = 0; i < stepIdx; i++) g += steps[i].perguntas.length;
    return g + qIdx;
  }

  /* Dots */
  function renderDots() {
    if (PB.mostrarDots === false) return;
    document.getElementById('stageDots').innerHTML = steps.map(function(_, i) {
      var c = 'stage-dot';
      if      (i < stepIdx)  c += ' done';
      else if (i === stepIdx) c += ' active';
      return '<div class="' + c + '"></div>';
    }).join('');
  }

  /* Progresso */
  function updateProgress(done) {
    var pct = done ? 100 : Math.round((globalIdx() / totalQ) * 100);
    document.getElementById('progressFill').style.width = pct + '%';
    var show = H.mostrarContadorPerguntas !== false;
    document.getElementById('stepCounter').textContent =
      (show && !done) ? 'Pergunta ' + (globalIdx()+1) + ' de ' + totalQ : '';
    renderDots();
  }

  /* Renderiza pergunta */
  function renderQuestion() {
    var step  = steps[stepIdx];
    var q     = step.perguntas[qIdx];
    var key   = stepIdx + '-' + qIdx;
    var first = qIdx === 0;
    var isLast = stepIdx === steps.length-1 && qIdx === step.perguntas.length-1;

    var heading = first
      ? '<div class="q-title">' + (step.titulo||'') + '</div>' +
        '<div class="q-sub">'   + (step.subtitulo||'') + '</div>' +
        '<div class="q-title small">' + q.texto + '</div>'
      : '<div class="q-title" style="margin-bottom:1.5rem">' + q.texto + '</div>';

    var nextTxt  = isLast ? (NAV.textoBotaoFinalizar||'Ver resultado →')
                          : (NAV.textoBotaoProximo||'Próximo →');
    var backVis  = (stepIdx===0 && qIdx===0) ? 'visibility:hidden' : '';
    var answered = answers[key] !== undefined;

    var optsHTML = (q.opcoes||[]).map(function(o, i) {
      var sel = answers[key] === i ? ' selected' : '';
      return '<div class="opt' + sel + '" data-idx="' + i + '">' +
               '<div class="opt-icon">' + (o.icone||'') + '</div>' +
               '<div class="opt-text">' + (o.label||'') + '</div>' +
               '<div class="opt-check"></div>' +
             '</div>';
    }).join('');

    document.getElementById('quizScreen').innerHTML =
      '<div class="card">' +
        '<div class="step-label">' + (step.label||'') + '</div>' +
        heading +
        '<div class="options">' + optsHTML + '</div>' +
        '<div class="nav">' +
          '<button class="btn-back" id="btnBack" style="' + backVis + '">' +
            (NAV.textoBotaoVoltar||'← Voltar') +
          '</button>' +
          '<button class="btn-next' + (answered?' active':'') + '" id="btnNext">' +
            nextTxt +
          '</button>' +
        '</div>' +
      '</div>';

    /* Eventos opções */
    document.querySelectorAll('.opt').forEach(function(el) {
      el.addEventListener('click', function() {
        document.querySelectorAll('.opt').forEach(function(x){ x.classList.remove('selected'); });
        el.classList.add('selected');
        answers[key] = parseInt(el.dataset.idx, 10);
        document.getElementById('btnNext').classList.add('active');
      });
    });

    document.getElementById('btnNext').addEventListener('click', goNext);
    document.getElementById('btnBack').addEventListener('click', goBack);
    updateProgress(false);
  }

  /* Navegação */
  function goNext() {
    var step = steps[stepIdx];
    if      (qIdx    < step.perguntas.length-1) { qIdx++;    renderQuestion(); }
    else if (stepIdx < steps.length-1)          { stepIdx++; qIdx=0; renderQuestion(); }
    else                                         { renderResult(); }
  }

  function goBack() {
    if      (qIdx    > 0) { qIdx--;    renderQuestion(); }
    else if (stepIdx > 0) { stepIdx--; qIdx=steps[stepIdx].perguntas.length-1; renderQuestion(); }
  }

  /* Resultado */
  function renderResult() {
    var R   = C.resultado || {};
    var CTA = C.botaoCTA  || {};
    updateProgress(true);
    document.querySelectorAll('.stage-dot').forEach(function(d){
      d.classList.remove('active'); d.classList.add('done');
    });
    var pills  = (R.tags||[]).map(function(t){ return '<span class="pill">'+t+'</span>'; }).join('');
    var target = CTA.abrirNovaAba ? 'target="_blank" rel="noopener"' : '';
    var sub    = CTA.sublabel ? '<span class="btn-cta-sub">'+CTA.sublabel+'</span>' : '';

    document.getElementById('quizScreen').innerHTML =
      '<div class="card">' +
        '<div class="result-wrap">' +
          '<span class="result-icon">' + (R.icone||'🎉') + '</span>' +
          '<div class="result-title">' + (R.titulo||'Obrigado!') + '</div>' +
          '<div class="result-text">'  + (R.texto||'') + '</div>' +
          '<div class="pills">' + pills + '</div>' +
          '<a class="btn-cta" href="' + (CTA.href||'#') + '" ' + target + '>' +
            (CTA.label||'Continuar') + sub +
          '</a>' +
        '</div>' +
      '</div>';
  }

  /* 8 ── Inicia */
  document.getElementById('quizApp').style.display = 'block';
  renderDots();
  renderQuestion();

}());
</script>

</body>
</html>
